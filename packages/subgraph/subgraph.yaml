specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TradeJournal
    network: kite-ai-testnet
    source:
      address: "0x94e7DAaeB4d28fF2e71912fd06818b41009de47e"
      abi: TradeJournal
      startBlock: 20600000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Trade
        - Agent
      abis:
        - name: TradeJournal
          file: ./abis/TradeJournal.json
      eventHandlers:
        - event: TradeLogged(indexed uint256,indexed address,uint256,string,string,uint256,uint256,bytes32)
          handler: handleTradeLogged
      file: ./src/tradeJournal.ts

  - kind: ethereum
    name: ReputationRegistry
    network: kite-ai-testnet
    source:
      address: "0x489A1C099971A14E793D2b38E07436ce7c1577C2"
      abi: ReputationRegistry
      startBlock: 20600000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AgentReputation
      abis:
        - name: ReputationRegistry
          file: ./abis/ReputationRegistry.json
      eventHandlers:
        - event: TradeRecorded(indexed address,bool,int256,uint256,uint8)
          handler: handleTradeRecorded
        - event: TierUpgraded(indexed address,uint8,uint8)
          handler: handleTierUpgraded
      file: ./src/reputationRegistry.ts

  - kind: ethereum
    name: AgentVaultFactory
    network: kite-ai-testnet
    source:
      address: "0x25ed063ddd7544db634A8F1Ea87cF56693E300F6"
      abi: AgentVaultFactory
      startBlock: 20600000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vault
      abis:
        - name: AgentVaultFactory
          file: ./abis/AgentVaultFactory.json
      eventHandlers:
        - event: VaultCreated(indexed address,indexed address,address,uint256)
          handler: handleVaultCreated
      file: ./src/agentVaultFactory.ts